name: python_trailing_stop_example
description: |
  Example for strategy_kind=python. Enters long when OBI(5) > entry_threshold,
  then maintains a trailing stop at peak_mid - trail_bps bps (or max_hold_ticks).
  The running peak since entry cannot be expressed in the declarative DSL.
strategy_kind: python
capital: 10000000
universe:
  symbols: ["005930", "000660"]
  dates: ["20260313"]
fees:
  commission_bps: 1.5
  tax_bps: 18.0
latency:
  submit_ms: 5.0
  jitter_ms: 1.0
  seed: 42
params:
  entry_threshold: 0.5
  trail_bps: 8.0
  max_hold_ticks: 300
