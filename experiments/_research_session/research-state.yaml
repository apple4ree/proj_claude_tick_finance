project: raw_eda_alpha_discovery
project_slug: raw-eda-alpha
started_at: "2026-04-18T00:00:00Z"
status: inner_loop
phase: bootstrap_complete_inner_loop_running

research_question: |
  Does raw-data-driven exploratory alpha discovery (direct EDA on OHLCV +
  order-flow features) systematically produce more tradable alpha on crypto
  intraday bar data than LLM-agent-driven strategy generation from curated
  signal briefs — where "tradable" means positive Information Ratio vs
  buy-and-hold on out-of-sample data?

primary_claim: |
  Raw-EDA + programmatic 4-gate validation recovers signals (weekly
  mean-reversion, order-flow persistence) that the LLM-agent pipeline (9
  strategies across 3 paradigms × 3 symbols × 3 horizons) never found.
  Evidence: first OOS-positive IR in the 44-strategy corpus (+1.75 / +2.44 /
  +3.89 on BTC/ETH/SOL for weekly mean-rev; +0.68 / +2.59 / +3.13 for taker
  flow).

evaluation:
  proxy_metric: OOS_information_ratio_vs_buy_and_hold
  proxy_horizon: 1h or 15m or 5m crypto bars
  baseline: buy-and-hold of the same asset over the exact OOS window
  secondary_metrics:
    - IC_pearson_on_signal_forward_return
    - ICIR_across_weekly_chunks
    - OOS_Sharpe
    - maximum_drawdown
  threshold_for_keep: OOS IR > 0 AND same-sign IR across sibling symbols
  threshold_for_conclude: ≥3 robust families (same-sign IR across ≥3 symbols)
                         each with mean_OOS_IR > 1.0

data_splits:
  IS:  { start: "2025-07-01", end: "2025-10-31", bars_1h: 2952 }
  OOS: { start: "2025-11-01", end: "2025-12-31", bars_1h: 1465 }
  hold_out_for_final: "project OOS = 2026-03-23 ~ 2026-03-30 (KRX only, locked)"

hypotheses:
  H1_weekly_meanrev:
    state: SUPPORTED
    is_ic: -0.2093
    oos_ir: { btc: 1.75, eth: 2.44, sol: 3.89 }
    oos_cross_symbol_same_sign: true
    notes: "strongest finding. raw-EDA top rank #1. Rule: long when roc_168h < -threshold."

  H2_taker_flow_persistence:
    state: SUPPORTED
    is_ic: +0.0755
    oos_ir: { btc: 0.68, eth: 2.59, sol: 3.13 }
    oos_cross_symbol_same_sign: true
    notes: "order-flow alpha. Rule: long when 6h taker-buy share > 168h baseline + 0.02."

  H3_zscore_trend:
    state: PARTIALLY_REFUTED
    is_ic: +0.0885
    oos_ir: { btc: -0.10, eth: 1.11, sol: 1.32 }
    oos_cross_symbol_same_sign: false
    notes: "trend signal works on ETH/SOL but inverts on BTC. Gate 4 fail."

  H4_hl_range_filter:
    state: UNTESTED
    is_ic: -0.1219
    notes: "rank #2 in discovery. volatility contraction signal. To run."

  H5_portfolio_basket:
    state: UNTESTED
    notes: "combine weekly_meanrev + taker_flow into a multi-signal portfolio. Hypothesis: diversification produces more stable IR than any single signal."

  H6_walk_forward_robustness:
    state: UNTESTED
    notes: "run 4-6 rolling IS/OOS windows to check parameter stability over time."

  H7_horizon_extension:
    state: UNTESTED
    notes: "does weekly mean-rev hold at 15m bars (lower fee-to-edge ratio) or 1d bars (bigger moves per trade)?"

current_focus: H4 H5 H6  # broaden + portfolio + walk-forward
last_outer_loop: "2026-04-18T15:00:00Z"
