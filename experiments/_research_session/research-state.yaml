    - Phase 2 auto (gen_strategy_from_brief.py) OR agent (alpha-designer family)
    - Phase 2.5 backtest (intraday_full_artifacts.py)
    - Phase 3 validate_strategy.py (4 gates)
    - Phase 3.5 benchmark_vs_bh.py
    - Phase 4 run_feedback.py (programmatic) + optional critic agents

infrastructure:
